services:
  postgres:
    image: postgres:16-alpine
    container_name: event-qr-attendance-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: event_qr_attendance
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
